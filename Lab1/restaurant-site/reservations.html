<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bulldog Reservations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="headline">
    <div id="head-logo">

        <img src="images/logo.png" alt="crescent moon with wine glass" id="logo">
        <h1 id="headtext"><a href="index.html">Arbor Oasis</a></h1>
    </div>
    <nav id="main-nav">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="reservations.html">Reservations</a>
    </nav>

</div>
    <p></p>
    <form action="" id="reservation">
        <label> Full Name:
            <input type="text" name="name" required maxlength="20">
        </label>
        <label> Email:
            <input type="email" name="email" required>
        </label>
        <label> Party Size:
            <input type="number" name="party_size" min="1" max="8">
        </label>
        <label> Date:
            <input type="date" name="date" required>
        </label>
        <label> Time:
            <input type="time" name="time" required>
        </label>

        <label> Dietary Restrictions:
            <input type="text" name="dietary_notes" maxlength="30">
        </label>
        <label> Would you like to opt in to our newsletter?
            <input type="checkbox" name="newsletter_opt_in">
        </label>
        <label>
            <button type="submit">Submit</button>
        </label>
        <label>
            <button type="reset">Reset Form</button>
        </label>


    </form>

    <fieldset form="reservation">
        <legend>Seating Preference</legend>
        <input type="radio" name="seating_pref" id="" value="indoor"> Indoor
        <input type="radio" name="seating_pref" value="outdoor"> Outdoor
        <input type="radio" name="seating_pref"  value="kennel"> Kennel
    </fieldset>
</body>
</html>
