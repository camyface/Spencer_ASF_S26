<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FormDemo</title>
</head>
<body>
<form action="" method="get">
    <label >First Name:
        <input type="text" name="first_name" >
    </label>
    <br>
    <label>Last Name:
        <input type="text" name="last_name">
    </label>
    <br>
    <label> Password:
        <input type="password"
               pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
               title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" >
    </label>
    <br>
    <label> Email:
        <input type="email" >
    </label>
    <br>
    <label> Dead or Alive?
        <input type="radio" name="livingStatus" value="Yes" checked>Yes
        <input type="radio" name="livingStatus" value="No">No
    </label>
    <br>
    <button type="submit">Submit</button>

</form>
</body>
</html>
